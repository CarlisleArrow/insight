apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: control-plane
spec:
  selector: { app: control-plane }
  ports:
    - name: http
      port: 8088
      targetPort: 8088
---
apiVersion: v1
kind: Service
metadata:
  name: sql-rewrite
  namespace: control-plane
spec:
  selector: { app: sql-rewrite }
  ports:
    - name: http
      port: 8000
      targetPort: 8000
